server:
  port: 8080

spring:
  application:
    name: life-simulator-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

simulator:
  frontend:
    cases-dir: ../frontend/playground/inputs/cases
  codex:
    enabled: true
    fallback-on-error: true
    command: codex
    model: gpt-5.3-codex-spark
    timeout: 75s
    config:
      model_reasoning_effort: low
      model_verbosity: low
      service_tier: fast
