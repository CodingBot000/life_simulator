server:
  port: 8080

spring:
  application:
    name: life-simulator-backend
  mvc:
    async:
      request-timeout: ${BACKEND_ASYNC_REQUEST_TIMEOUT:300s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

simulator:
  llm-provider: ${SIMULATOR_LLM_PROVIDER:openai}
  frontend:
    cases-dir: ../frontend/playground/inputs/cases
  database:
    enabled: ${BACKEND_DATABASE_ENABLED:false}
    url: ${BACKEND_DATABASE_URL:jdbc:postgresql://localhost:5432/life_simulator_dev}
    username: ${BACKEND_DATABASE_USERNAME:life_sim_user}
    password: ${BACKEND_DATABASE_PASSWORD:life_sim_password}
    migrate: ${BACKEND_DATABASE_MIGRATE:true}
  cors:
    allowed-origins: ${SIMULATOR_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://ai-miracle.cloud,https://www.ai-miracle.cloud,http://ai-miracle.cloud,http://www.ai-miracle.cloud,http://35.164.88.121}
  security:
    rate-limit:
      enabled: ${SIMULATOR_RATE_LIMIT_ENABLED:true}
      use-forwarded-headers: ${SIMULATOR_RATE_LIMIT_USE_FORWARDED_HEADERS:false}
      ip-minute-limit: ${SIMULATOR_RATE_LIMIT_IP_MINUTE:5}
      ip-hour-limit: ${SIMULATOR_RATE_LIMIT_IP_HOUR:30}
      session-hour-limit: ${SIMULATOR_RATE_LIMIT_SESSION_HOUR:10}
      minute-window: ${SIMULATOR_RATE_LIMIT_MINUTE_WINDOW:60s}
      hour-window: ${SIMULATOR_RATE_LIMIT_HOUR_WINDOW:1h}
  recommendations:
    enabled: ${SIMULATOR_RECOMMENDATIONS_ENABLED:true}
    llm-intent-enabled: ${SIMULATOR_RECOMMENDATIONS_LLM_INTENT_ENABLED:false}
    default-max-items: ${SIMULATOR_RECOMMENDATIONS_DEFAULT_MAX_ITEMS:6}
    max-items: ${SIMULATOR_RECOMMENDATIONS_MAX_ITEMS:12}
    default-providers: ${SIMULATOR_RECOMMENDATIONS_DEFAULT_PROVIDERS:catalog,naver,youtube}
    naver:
      enabled: ${SIMULATOR_RECOMMENDATIONS_NAVER_ENABLED:true}
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      timeout: ${SIMULATOR_RECOMMENDATIONS_NAVER_TIMEOUT:3s}
      display: ${SIMULATOR_RECOMMENDATIONS_NAVER_DISPLAY:3}
      max-queries: ${SIMULATOR_RECOMMENDATIONS_NAVER_MAX_QUERIES:2}
      shopping-enabled: ${SIMULATOR_RECOMMENDATIONS_NAVER_SHOPPING_ENABLED:true}
    youtube:
      enabled: ${SIMULATOR_RECOMMENDATIONS_YOUTUBE_ENABLED:true}
      api-key: ${YOUTUBE_API_KEY:}
      timeout: ${SIMULATOR_RECOMMENDATIONS_YOUTUBE_TIMEOUT:3s}
      max-items: ${SIMULATOR_RECOMMENDATIONS_YOUTUBE_MAX_ITEMS:4}
      max-queries: ${SIMULATOR_RECOMMENDATIONS_YOUTUBE_MAX_QUERIES:1}
      seed-resource: ${SIMULATOR_RECOMMENDATIONS_YOUTUBE_SEED_RESOURCE:/recommendations/youtube.videos.ko.json}
  codex:
    enabled: ${SIMULATOR_CODEX_ENABLED:true}
    fallback-on-error: ${SIMULATOR_CODEX_FALLBACK_ON_ERROR:false}
    command: ${SIMULATOR_CODEX_COMMAND:codex}
    model: ${SIMULATOR_CODEX_MODEL:gpt-5.3-codex-spark}
    timeout: ${SIMULATOR_CODEX_TIMEOUT:75s}
    environment-allowlist:
      - PATH
      - HOME
      - USER
      - LOGNAME
      - SHELL
      - TMPDIR
      - LANG
      - LC_ALL
      - CODEX_HOME
      - XDG_CONFIG_HOME
      - XDG_DATA_HOME
      - XDG_CACHE_HOME
    config:
      model_reasoning_effort: low
      model_verbosity: low
      service_tier: fast
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${SIMULATOR_OPENAI_MODEL:gpt-5-nano}
    timeout: ${SIMULATOR_OPENAI_TIMEOUT:75s}
    fallback-on-error: ${SIMULATOR_OPENAI_FALLBACK_ON_ERROR:false}
    prompt-cache-retention: ${SIMULATOR_OPENAI_PROMPT_CACHE_RETENTION:in_memory}
    stage-profiles:
      state_loader:
        reasoning-effort: low
        verbosity: low
        max-output-tokens: 1600
        prompt-cache-key: life-sim:v1:state-loader
      planner:
        reasoning-effort: low
        verbosity: low
        max-output-tokens: 1600
        prompt-cache-key: life-sim:v1:planner
      scenario_a:
        reasoning-effort: low
        verbosity: medium
        max-output-tokens: 2600
        prompt-cache-key: life-sim:v1:scenario
      scenario_b:
        reasoning-effort: low
        verbosity: medium
        max-output-tokens: 2600
        prompt-cache-key: life-sim:v1:scenario
      risk_a:
        reasoning-effort: low
        verbosity: low
        max-output-tokens: 1600
        prompt-cache-key: life-sim:v1:risk
      risk_b:
        reasoning-effort: low
        verbosity: low
        max-output-tokens: 1600
        prompt-cache-key: life-sim:v1:risk
      ab_reasoning:
        reasoning-effort: low
        verbosity: low
        max-output-tokens: 2200
        prompt-cache-key: life-sim:v1:ab-reasoning
      advisor:
        reasoning-effort: low
        verbosity: medium
        max-output-tokens: 3200
        prompt-cache-key: life-sim:v1:advisor
      reflection:
        reasoning-effort: low
        verbosity: low
        max-output-tokens: 2200
        prompt-cache-key: life-sim:v1:reflection
  mock:
    model: ${SIMULATOR_MOCK_MODEL:spring-mock}
