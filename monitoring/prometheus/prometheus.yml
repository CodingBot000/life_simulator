global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "life_simulator_app"
    metrics_path: /api/metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["app:3000"]
